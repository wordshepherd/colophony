global:
  resolve_timeout: 5m

route:
  # Default: discard all alerts. Set receiver to 'slack' and configure
  # SLACK_WEBHOOK_URL in alertmanager-slack.yml to enable Slack alerts.
  receiver: 'null'
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: 'null'
