version: '3.8'

services:
  # Development PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: prospector-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: prospector
      POSTGRES_PASSWORD: password
      POSTGRES_DB: prospector
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prospector']
      interval: 5s
      timeout: 5s
      retries: 5

  # Test PostgreSQL database (in-memory for speed)
  postgres-test:
    image: postgres:16-alpine
    container_name: prospector-postgres-test
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: prospector_test
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test']
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for sessions, cache, and job queue
  redis:
    image: redis:7-alpine
    container_name: prospector-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible file storage
  minio:
    image: minio/minio:latest
    container_name: prospector-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # Create default MinIO bucket on startup
  minio-setup:
    image: minio/mc:latest
    container_name: prospector-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin;
      mc mb minio/submissions --ignore-existing;
      mc mb minio/quarantine --ignore-existing;
      exit 0;
      "

  # tusd for resumable file uploads (tus protocol)
  tusd:
    image: tusproject/tusd:latest
    container_name: prospector-tusd
    ports:
      - '1080:1080'
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    command:
      - -s3-endpoint
      - http://minio:9000
      - -s3-bucket
      - quarantine
      - -s3-object-prefix
      - uploads/
      - -hooks-http
      - http://host.docker.internal:4000/hooks/tusd
      - -hooks-http-forward-headers
      - Authorization,X-Organization-Id
      - -behind-proxy
      - -verbose
    depends_on:
      minio:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # Zitadel OIDC identity provider (optional in development)
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.10.1
    container_name: prospector-zitadel
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
    ports:
      - '127.0.0.1:8080:8080'
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD:-zitadel_password}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: prospector
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:-password}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALSECURE: 'false'
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_TLS_ENABLED: 'false'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', '/app/zitadel', 'ready']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles:
      - auth

  # ClamAV for virus scanning (optional in development)
  clamav:
    image: clamav/clamav:stable
    container_name: prospector-clamav
    ports:
      - '3310:3310'
    volumes:
      - clamav_data:/var/lib/clamav
    environment:
      # Disable freshclam auto-update in dev to speed up startup
      CLAMAV_NO_FRESHCLAM: 'false'
    healthcheck:
      test: ['CMD', 'clamdscan', '--ping', '1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # ClamAV takes time to load virus definitions
    profiles:
      - full  # Only start with: docker-compose --profile full up

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
