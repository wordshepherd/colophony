version: '3.8'

services:
  # Development PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: colophony-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: colophony
      POSTGRES_PASSWORD: password
      POSTGRES_DB: colophony
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U colophony']
      interval: 5s
      timeout: 5s
      retries: 5

  # PgBouncer connection pooler (transaction mode for RLS SET LOCAL)
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: colophony-pgbouncer
    ports:
      - '6432:6432'
    environment:
      POSTGRES_USER: colophony
      POSTGRES_PASSWORD: password
      APP_USER_PASSWORD: app_password
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_MAX_CLIENT_CONN: 100
      PGBOUNCER_MAX_DB_CONNECTIONS: 30
    volumes:
      - ./docker/pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: /entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 6432']
      interval: 5s
      timeout: 5s
      retries: 5

  # Test PostgreSQL database (in-memory for speed)
  postgres-test:
    image: postgres:16-alpine
    container_name: colophony-postgres-test
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: colophony_test
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test']
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for sessions, cache, and job queue
  redis:
    image: redis:7-alpine
    container_name: colophony-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible file storage
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: colophony-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # Create default MinIO bucket on startup
  minio-setup:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: colophony-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set minio http://minio:9000 minioadmin minioadmin;
      mc mb minio/submissions --ignore-existing;
      mc mb minio/quarantine --ignore-existing;
      mc anonymous set none minio/submissions;
      mc anonymous set none minio/quarantine;
      "

  # tusd for resumable file uploads (tus protocol)
  tusd:
    image: tusproject/tusd:v2.8.0
    container_name: colophony-tusd
    ports:
      - '1080:1080'
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    command:
      - -port
      - "1080"
      - -s3-endpoint
      - http://minio:9000
      - -s3-bucket
      - quarantine
      - -s3-object-prefix
      - uploads/
      - -hooks-http
      - http://host.docker.internal:4000/webhooks/tusd
      - -hooks-http-forward-headers
      - Authorization,X-Organization-Id,X-Embed-Token
      - -cors-allow-origin
      - ".*"
      - -cors-allow-headers
      - Authorization,Origin,X-Requested-With,Content-Type,Upload-Length,Upload-Offset,Tus-Resumable,Upload-Metadata,Upload-Defer-Length,X-Organization-Id,X-Embed-Token
      - -behind-proxy
      - -verbose
    depends_on:
      minio:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # Zitadel OIDC identity provider (optional in development)
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.10.1
    container_name: colophony-zitadel
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
    ports:
      - '127.0.0.1:8080:8080'
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD:-zitadel_password}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: colophony
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:-password}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALSECURE: 'false'
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_TLS_ENABLED: 'false'
      # Use Login V1 (built-in). Login V2 requires a separate frontend app.
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: 'false'
      # Disable MFA requirement for dev/E2E (no TOTP prompts during login)
      ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_FORCEMFA: 'false'
      ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_FORCEMFALOCALONLY: 'false'
      ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_SECONDFACTORS: ''
      ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_MULTIFACTORS: ''
      # Create machine user with IAM_OWNER role + PAT on first init (E2E provisioning)
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/admin.pat
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: e2e-admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: E2E Admin Service Account
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: '2030-01-01T00:00:00Z'
    volumes:
      - ./.docker/zitadel/machinekey:/machinekey
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', '/app/zitadel', 'ready']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles:
      - auth

  # Inngest workflow engine (optional — for Slate publication pipeline)
  inngest:
    image: inngest/inngest:v1.17.5
    container_name: colophony-inngest
    ports:
      - '8288:8288'
    command: dev -u http://host.docker.internal:4000/api/inngest
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    profiles:
      - slate

  # Prometheus metrics collection (optional — for monitoring)
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: colophony-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    profiles:
      - monitoring

  # AlertManager for Slack notifications (optional — for monitoring)
  alertmanager:
    build: ./docker/alertmanager
    container_name: colophony-alertmanager
    ports:
      - '9093:9093'
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    profiles:
      - monitoring

  # Loki log aggregation (optional — for monitoring)
  loki:
    image: grafana/loki:3.5.0
    container_name: colophony-loki
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    profiles:
      - monitoring

  # Promtail log shipper (optional — for monitoring)
  promtail:
    image: grafana/promtail:3.5.0
    container_name: colophony-promtail
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    profiles:
      - monitoring

  # Grafana dashboards (optional — for monitoring)
  grafana:
    image: grafana/grafana:12.0.1
    container_name: colophony-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # ClamAV for virus scanning (optional in development)
  clamav:
    image: clamav/clamav:stable
    container_name: colophony-clamav
    ports:
      - '3310:3310'
    volumes:
      - clamav_data:/var/lib/clamav
    environment:
      # Disable freshclam auto-update in dev to speed up startup
      CLAMAV_NO_FRESHCLAM: 'false'
    healthcheck:
      test: ['CMD', 'clamdscan', '--ping', '1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # ClamAV takes time to load virus definitions
    profiles:
      - full  # Only start with: docker-compose --profile full up

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
  prometheus_data:
  grafana_data:
  loki_data:
