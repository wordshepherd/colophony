# Coolify resource: Data Infrastructure
# Services: postgres, pgbouncer, redis, minio
# Deploy frequency: Rare (infra changes only)
# Requires: colophony-net external network (scripts/coolify-network-setup.sh)

services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-colophony}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-colophony_staging}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      # WAL-G backup config (omit BACKUP_S3_PREFIX to disable backups)
      WALG_S3_PREFIX: ${BACKUP_S3_PREFIX:-}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_KEY:-}
      AWS_REGION: ${BACKUP_S3_REGION:-us-east-1}
      AWS_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      AWS_S3_FORCE_PATH_STYLE: ${BACKUP_S3_FORCE_PATH_STYLE:-false}
      WALG_COMPRESSION_METHOD: ${BACKUP_COMPRESSION:-lz4}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
    command:
      - postgres
      - -c
      - archive_mode=on
      - -c
      - archive_command=test -n "$WALG_S3_PREFIX" && wal-g wal-push %p || true
      - -c
      - archive_timeout=60
      - -c
      - wal_level=replica
      - -c
      - log_min_duration_statement=1000
      - -c
      - "log_line_prefix=%m [%p] %q%u@%d "
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-colophony} -d ${POSTGRES_DB:-colophony_staging}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - colophony-net

  pgbouncer:
    build:
      context: ./docker/pgbouncer
      dockerfile: Dockerfile
    expose:
      - "6432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-colophony}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-colophony_staging}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-10}
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-100}
      PGBOUNCER_MAX_DB_CONNECTIONS: ${PGBOUNCER_MAX_DB_CONNECTIONS:-25}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - colophony-net

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - staging_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - colophony-net

  minio:
    image: minio/minio:latest
    expose:
      - "9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - staging_minio_data:/data
    command: server /data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - colophony-net

volumes:
  staging_postgres_data:
    name: colophony_staging_postgres_data
  staging_redis_data:
    name: colophony_staging_redis_data
  staging_minio_data:
    name: colophony_staging_minio_data

networks:
  colophony-net:
    external: true
