# Coolify resource: Application Services
# Services: api, web
# Deploy frequency: Every code push
# Requires: data group (postgres, pgbouncer, redis, minio) — restart policy handles cold-start; deploy workflow enforces ordering

services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: builder
    expose:
      - "4000"
    entrypoint: ["sh", "-c"]
    command:
      - |
        apk add --no-cache postgresql16-client bash curl
        /app/scripts/init-prod.sh || echo "WARNING: init-prod.sh exited $? (non-fatal for staging)"
        echo "Setting up MinIO buckets..."
        node -e "
        const { S3Client, CreateBucketCommand, HeadBucketCommand } = require('@aws-sdk/client-s3');
        const client = new S3Client({
          endpoint: process.env.S3_ENDPOINT,
          region: process.env.S3_REGION || 'us-east-1',
          credentials: { accessKeyId: process.env.S3_ACCESS_KEY, secretAccessKey: process.env.S3_SECRET_KEY },
          forcePathStyle: true,
        });
        async function ensureBucket(name) {
          try { await client.send(new HeadBucketCommand({ Bucket: name })); console.log('  Bucket ' + name + ' exists'); }
          catch { await client.send(new CreateBucketCommand({ Bucket: name })); console.log('  Bucket ' + name + ' created'); }
        }
        (async () => { await ensureBucket('submissions'); await ensureBucket('quarantine'); })().catch(e => console.warn('MinIO setup warning:', e.message));
        " || echo "WARNING: MinIO bucket setup failed (non-fatal)"
        echo "Starting API server..."
        exec node /app/apps/api/dist/main.js
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DATABASE_URL: postgresql://${POSTGRES_USER:-colophony}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-colophony_staging}
      DATABASE_APP_URL: postgresql://app_user:${APP_USER_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-colophony_staging}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: submissions
      S3_QUARANTINE_BUCKET: quarantine
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_REGION: us-east-1
      TUS_ENDPOINT: http://tusd:1080
      CORS_ORIGIN: https://${DOMAIN}
      APP_URL: https://${DOMAIN}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      # Auth (Zitadel Cloud)
      ZITADEL_AUTHORITY: ${ZITADEL_AUTHORITY:-}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-}
      ZITADEL_WEBHOOK_SECRET: ${ZITADEL_WEBHOOK_SECRET:-}
      # Payments
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Background jobs (Inngest Cloud)
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-}
      # Email
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-none}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-staging}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      # Federation
      FEDERATION_ENABLED: ${FEDERATION_ENABLED:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - colophony-net

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
        NEXT_PUBLIC_TUS_URL: https://${DOMAIN}/upload/files/
        NEXT_PUBLIC_ZITADEL_AUTHORITY: ${NEXT_PUBLIC_ZITADEL_AUTHORITY:-}
        NEXT_PUBLIC_ZITADEL_CLIENT_ID: ${NEXT_PUBLIC_ZITADEL_CLIENT_ID:-}
        NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-staging}
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-staging}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M
    networks:
      - colophony-net

networks:
  colophony-net:
    external: true
