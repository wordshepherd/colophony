services:
  # Caddy reverse proxy — TLS termination + routing
  caddy:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: colophony-caddy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      # Gateway rate limiting (defense-in-depth — API has its own limits)
      CADDY_RL_GENERAL_MAX: ${CADDY_RL_GENERAL_MAX:-300}
      CADDY_RL_GENERAL_WINDOW: ${CADDY_RL_GENERAL_WINDOW:-1m}
      CADDY_RL_UPLOAD_MAX: ${CADDY_RL_UPLOAD_MAX:-30}
      CADDY_RL_UPLOAD_WINDOW: ${CADDY_RL_UPLOAD_WINDOW:-1m}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - colophony

  # PgBouncer connection pooler (transaction mode for RLS SET LOCAL)
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    container_name: colophony-pgbouncer
    expose:
      - "6432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-colophony}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-colophony}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-200}
      PGBOUNCER_MAX_DB_CONNECTIONS: ${PGBOUNCER_MAX_DB_CONNECTIONS:-50}
    volumes:
      - ./docker/pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: /entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - colophony

  # Fastify API + tRPC server
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: colophony-api
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-colophony}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-colophony}
      DATABASE_APP_URL: postgresql://app_user:${APP_USER_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-colophony}?sslmode=disable
      DB_SSL: ${DB_SSL:-false}
      DB_SSL_CA_PATH: ${DB_SSL_CA_PATH:-}
      DB_ADMIN_POOL_MAX: ${DB_ADMIN_POOL_MAX:-5}
      DB_APP_POOL_MAX: ${DB_APP_POOL_MAX:-20}
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # S3 / Garage
      S3_ENDPOINT: http://garage:3900
      S3_BUCKET: submissions
      S3_QUARANTINE_BUCKET: quarantine
      S3_ACCESS_KEY: ${GARAGE_S3_ACCESS_KEY}
      S3_SECRET_KEY: ${GARAGE_S3_SECRET_KEY}
      S3_REGION: us-east-1
      TUS_ENDPOINT: http://tusd:1080
      # Application
      CORS_ORIGIN: https://${DOMAIN:-localhost}
      APP_URL: https://${DOMAIN:-localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Rate limiting
      RATE_LIMIT_DEFAULT_MAX: ${RATE_LIMIT_DEFAULT_MAX:-60}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-200}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_KEY_PREFIX: ${RATE_LIMIT_KEY_PREFIX:-colophony:rl}
      AUTH_FAILURE_THROTTLE_MAX: ${AUTH_FAILURE_THROTTLE_MAX:-10}
      AUTH_FAILURE_THROTTLE_WINDOW_SECONDS: ${AUTH_FAILURE_THROTTLE_WINDOW_SECONDS:-300}
      # Webhook hardening
      WEBHOOK_TIMESTAMP_MAX_AGE_SECONDS: ${WEBHOOK_TIMESTAMP_MAX_AGE_SECONDS:-300}
      WEBHOOK_RATE_LIMIT_MAX: ${WEBHOOK_RATE_LIMIT_MAX:-100}
      # ClamAV
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      VIRUS_SCAN_ENABLED: ${VIRUS_SCAN_ENABLED:-true}
      # Auth (Zitadel)
      ZITADEL_AUTHORITY: ${ZITADEL_AUTHORITY:-}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-}
      ZITADEL_WEBHOOK_SECRET: ${ZITADEL_WEBHOOK_SECRET:-}
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-false}
      # Payments (Stripe)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Federation
      FEDERATION_ENABLED: ${FEDERATION_ENABLED:-false}
      FEDERATION_DOMAIN: ${FEDERATION_DOMAIN:-}
      FEDERATION_CONTACT: ${FEDERATION_CONTACT:-}
      FEDERATION_PRIVATE_KEY: ${FEDERATION_PRIVATE_KEY:-}
      FEDERATION_PUBLIC_KEY: ${FEDERATION_PUBLIC_KEY:-}
      FEDERATION_RATE_LIMIT_MAX: ${FEDERATION_RATE_LIMIT_MAX:-60}
      FEDERATION_RATE_LIMIT_WINDOW_SECONDS: ${FEDERATION_RATE_LIMIT_WINDOW_SECONDS:-60}
      FEDERATION_RATE_LIMIT_FAIL_MODE: ${FEDERATION_RATE_LIMIT_FAIL_MODE:-open}
      # Status tokens
      STATUS_TOKEN_TTL_DAYS: ${STATUS_TOKEN_TTL_DAYS:-90}
      # Background jobs (Inngest)
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-}
      INNGEST_DEV: ${INNGEST_DEV:-false}
      # Contracts (Documenso)
      DOCUMENSO_API_URL: ${DOCUMENSO_API_URL:-}
      DOCUMENSO_API_KEY: ${DOCUMENSO_API_KEY:-}
      DOCUMENSO_WEBHOOK_SECRET: ${DOCUMENSO_WEBHOOK_SECRET:-}
      # Federation hub (managed hosting)
      HUB_DOMAIN: ${HUB_DOMAIN:-}
      HUB_REGISTRATION_TOKEN: ${HUB_REGISTRATION_TOKEN:-}
      # Email / Relay
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-none}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM: ${SENDGRID_FROM:-}
      # Monitoring — Sentry
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      # Monitoring — Prometheus
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      # Monitoring — Webhook health staleness
      WEBHOOK_HEALTH_ZITADEL_STALE_SECONDS: ${WEBHOOK_HEALTH_ZITADEL_STALE_SECONDS:-3600}
      WEBHOOK_HEALTH_STRIPE_STALE_SECONDS: ${WEBHOOK_HEALTH_STRIPE_STALE_SECONDS:-86400}
      WEBHOOK_HEALTH_DOCUMENSO_STALE_SECONDS: ${WEBHOOK_HEALTH_DOCUMENSO_STALE_SECONDS:-86400}
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - colophony

  # Next.js frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-localhost}
        NEXT_PUBLIC_TUS_URL: https://${DOMAIN:-localhost}/upload/files/
        NEXT_PUBLIC_ZITADEL_AUTHORITY: ${NEXT_PUBLIC_ZITADEL_AUTHORITY:-}
        NEXT_PUBLIC_ZITADEL_CLIENT_ID: ${NEXT_PUBLIC_ZITADEL_CLIENT_ID:-}
        NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    container_name: colophony-web
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - colophony

  # PostgreSQL database (custom image with WAL-G + cron for continuous backups)
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: colophony-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-colophony}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-colophony}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      # WAL-G backup config (mapped from BACKUP_* vars to avoid collision with Garage)
      WALG_S3_PREFIX: ${BACKUP_S3_PREFIX:-}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_KEY:-}
      AWS_REGION: ${BACKUP_S3_REGION:-us-east-1}
      AWS_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      AWS_S3_FORCE_PATH_STYLE: ${BACKUP_S3_FORCE_PATH_STYLE:-false}
      WALG_COMPRESSION_METHOD: ${BACKUP_COMPRESSION:-lz4}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - archive_mode=on
      - -c
      - archive_command=test -n "$WALG_S3_PREFIX" && wal-g wal-push %p || true
      - -c
      - archive_timeout=60
      - -c
      - wal_level=replica
      - -c
      - log_min_duration_statement=1000
      - -c
      - "log_line_prefix=%m [%p] %q%u@%d "
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-colophony}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - colophony

  # Redis for sessions, cache, and job queue
  redis:
    image: redis:7-alpine
    container_name: colophony-redis
    expose:
      - "6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - colophony

  # Garage S3-compatible object storage
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: colophony-garage
    expose:
      - "3900"
      - "3903"
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
    volumes:
      - ./docker/garage/garage.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:3903/health || curl -sf -H \"Authorization: Bearer $GARAGE_ADMIN_TOKEN\" http://localhost:3903/v2/GetClusterStatus > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - colophony

  # Initialize Garage buckets and API key on startup
  garage-setup:
    image: alpine:3.21
    container_name: colophony-garage-setup
    depends_on:
      garage:
        condition: service_healthy
    volumes:
      - ./docker/garage/init-garage.sh:/init-garage.sh:ro
    entrypoint: ['/bin/sh', '-c', 'apk add --no-cache curl jq > /dev/null 2>&1 && sh /init-garage.sh']
    environment:
      GARAGE_ADMIN_URL: http://garage:3903
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_S3_ACCESS_KEY: ${GARAGE_S3_ACCESS_KEY}
      GARAGE_S3_SECRET_KEY: ${GARAGE_S3_SECRET_KEY}
    networks:
      - colophony

  # tusd for resumable file uploads
  tusd:
    image: tusproject/tusd:v2.8.0
    container_name: colophony-tusd
    expose:
      - "1080"
    environment:
      AWS_ACCESS_KEY_ID: ${GARAGE_S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_S3_SECRET_KEY}
      AWS_REGION: us-east-1
    command:
      - -port
      - "1080"
      - -s3-endpoint
      - http://garage:3900
      - -s3-bucket
      - quarantine
      - -s3-object-prefix
      - uploads/
      - -hooks-http
      - http://api:4000/webhooks/tusd
      - -hooks-http-forward-headers
      - Authorization,X-Organization-Id,X-Embed-Token,X-Status-Token
      - -cors-allow-origin
      - ".*"
      - -cors-allow-headers
      - Authorization,Origin,X-Requested-With,Content-Type,Upload-Length,Upload-Offset,Tus-Resumable,Upload-Metadata,Upload-Defer-Length,X-Organization-Id,X-Embed-Token,X-Status-Token
      - -behind-proxy
      - -base-path
      - /upload
    depends_on:
      garage-setup:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - colophony

  # ClamAV virus scanning (optional — enable with --profile full)
  clamav:
    image: clamav/clamav:stable
    container_name: colophony-clamav
    expose:
      - "3310"
    volumes:
      - clamav_data:/var/lib/clamav
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
    profiles:
      - full
    networks:
      - colophony

  # Database migration (runs once, then exits)
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    container_name: colophony-migrate
    entrypoint: ["sh", "-c"]
    command:
      - |
        apk add --no-cache postgresql16-client bash
        /app/scripts/init-prod.sh
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-colophony}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-colophony}
      DATABASE_APP_URL: postgresql://app_user:${APP_USER_PASSWORD}@postgres:5432/${POSTGRES_DB:-colophony}
    volumes:
      - ./scripts/init-prod.sh:/app/scripts/init-prod.sh:ro
      - ./scripts/verify-rls.sh:/app/scripts/verify-rls.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - colophony

  # Prometheus metrics collection
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: colophony-prometheus
    expose:
      - "9090"
    volumes:
      - ./docker/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - colophony

  # AlertManager for Slack notifications
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: colophony-alertmanager
    expose:
      - "9093"
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - colophony

  # Grafana dashboards
  grafana:
    image: grafana/grafana:12.0.1
    container_name: colophony-grafana
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001/grafana}
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - colophony

  # Loki log aggregation
  loki:
    image: grafana/loki:3.5.0
    container_name: colophony-loki
    expose:
      - "3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki/loki-config.prod.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - colophony

  # Promtail log shipper
  promtail:
    image: grafana/promtail:3.5.0
    container_name: colophony-promtail
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - colophony

volumes:
  caddy_data:
    name: ${VOLUME_PREFIX:-colophony}_caddy_data
  caddy_config:
    name: ${VOLUME_PREFIX:-colophony}_caddy_config
  postgres_data:
    name: ${VOLUME_PREFIX:-colophony}_postgres_data
  redis_data:
    name: ${VOLUME_PREFIX:-colophony}_redis_data
  garage_data:
    name: ${VOLUME_PREFIX:-colophony}_garage_data
  garage_meta:
    name: ${VOLUME_PREFIX:-colophony}_garage_meta
  clamav_data:
    name: ${VOLUME_PREFIX:-colophony}_clamav_data
  prometheus_data:
    name: ${VOLUME_PREFIX:-colophony}_prometheus_data
  grafana_data:
    name: ${VOLUME_PREFIX:-colophony}_grafana_data
  loki_data:
    name: ${VOLUME_PREFIX:-colophony}_loki_data

networks:
  colophony:
    driver: bridge
