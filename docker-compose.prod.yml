services:
  # Reverse proxy — only externally exposed service
  nginx:
    image: nginx:alpine
    container_name: prospector-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - prospector

  # NestJS API + tRPC server
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: prospector-api
    expose:
      - "4000"
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://app_user:${APP_USER_PASSWORD}@postgres:5432/${POSTGRES_DB:-prospector}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: submissions
      S3_QUARANTINE_BUCKET: quarantine
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_REGION: us-east-1
      TUS_ENDPOINT: http://tusd:1080
      CORS_ORIGIN: http://${DOMAIN:-localhost}
      APP_URL: http://${DOMAIN:-localhost}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - prospector

  # Next.js frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${DOMAIN:-localhost}/trpc
    container_name: prospector-web
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - prospector

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: prospector-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prospector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-prospector}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prospector}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - prospector

  # Redis for sessions, cache, and job queue
  redis:
    image: redis:7-alpine
    container_name: prospector-redis
    expose:
      - "6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - prospector

  # MinIO S3-compatible file storage
  minio:
    image: minio/minio:latest
    container_name: prospector-minio
    expose:
      - "9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - prospector

  # Create default MinIO buckets on startup
  minio-setup:
    image: minio/mc:latest
    container_name: prospector-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb minio/submissions --ignore-existing;
      mc mb minio/quarantine --ignore-existing;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - prospector

  # tusd for resumable file uploads
  tusd:
    image: tusproject/tusd:latest
    container_name: prospector-tusd
    expose:
      - "1080"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
    command:
      - -s3-endpoint
      - http://minio:9000
      - -s3-bucket
      - quarantine
      - -s3-object-prefix
      - uploads/
      - -hooks-http
      - http://api:4000/hooks/tusd
      - -hooks-http-forward-headers
      - Authorization,X-Organization-Id
      - -behind-proxy
      - -base-path
      - /upload
    depends_on:
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - prospector

  # ClamAV virus scanning (optional — enable with --profile full)
  clamav:
    image: clamav/clamav:stable
    container_name: prospector-clamav
    expose:
      - "3310"
    volumes:
      - clamav_data:/var/lib/clamav
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
    profiles:
      - full
    networks:
      - prospector

  # Database migration (runs once, then exits)
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    container_name: prospector-migrate
    entrypoint: ["sh", "-c"]
    command:
      - |
        # Install psql for RLS policy application, openssl for Prisma engine
        apk add --no-cache postgresql16-client openssl
        # Run migrations and apply RLS
        /app/scripts/init-prod.sh
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-prospector}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-prospector}
      APP_DATABASE_URL: postgresql://app_user:${APP_USER_PASSWORD}@postgres:5432/${POSTGRES_DB:-prospector}
    volumes:
      - ./scripts/init-prod.sh:/app/scripts/init-prod.sh:ro
      - ./packages/db/prisma:/app/prisma:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prospector

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:

networks:
  prospector:
    driver: bridge
