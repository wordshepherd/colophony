services:
  # Reverse proxy — only externally exposed service
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: colophony-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    stop_signal: SIGQUIT
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - colophony

  # PgBouncer connection pooler (transaction mode for RLS SET LOCAL)
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    container_name: colophony-pgbouncer
    expose:
      - "6432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-colophony}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-colophony}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-200}
      PGBOUNCER_MAX_DB_CONNECTIONS: ${PGBOUNCER_MAX_DB_CONNECTIONS:-50}
    volumes:
      - ./docker/pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: /entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - colophony

  # Fastify API + tRPC server
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: colophony-api
    expose:
      - "4000"
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-colophony}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-colophony}
      DATABASE_APP_URL: postgresql://app_user:${APP_USER_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-colophony}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: submissions
      S3_QUARANTINE_BUCKET: quarantine
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_REGION: us-east-1
      TUS_ENDPOINT: http://tusd:1080
      CORS_ORIGIN: https://${DOMAIN:-localhost}
      APP_URL: https://${DOMAIN:-localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - colophony

  # Next.js frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-localhost}
        NEXT_PUBLIC_TUS_URL: https://${DOMAIN:-localhost}/upload/files/
        NEXT_PUBLIC_ZITADEL_AUTHORITY: ${NEXT_PUBLIC_ZITADEL_AUTHORITY:-}
        NEXT_PUBLIC_ZITADEL_CLIENT_ID: ${NEXT_PUBLIC_ZITADEL_CLIENT_ID:-}
        NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    container_name: colophony-web
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - colophony

  # PostgreSQL database (custom image with WAL-G + cron for continuous backups)
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: colophony-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-colophony}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-colophony}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      # WAL-G backup config (mapped from BACKUP_* vars to avoid collision with MinIO)
      WALG_S3_PREFIX: ${BACKUP_S3_PREFIX:-}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_KEY:-}
      AWS_REGION: ${BACKUP_S3_REGION:-us-east-1}
      AWS_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      AWS_S3_FORCE_PATH_STYLE: ${BACKUP_S3_FORCE_PATH_STYLE:-false}
      WALG_COMPRESSION_METHOD: ${BACKUP_COMPRESSION:-lz4}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - archive_mode=on
      - -c
      - archive_command=test -n "$WALG_S3_PREFIX" && wal-g wal-push %p || true
      - -c
      - archive_timeout=60
      - -c
      - wal_level=replica
      - -c
      - log_min_duration_statement=1000
      - -c
      - "log_line_prefix=%m [%p] %q%u@%d "
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-colophony}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - colophony

  # Redis for sessions, cache, and job queue
  redis:
    image: redis:7-alpine
    container_name: colophony-redis
    expose:
      - "6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - colophony

  # MinIO S3-compatible file storage
  minio:
    image: minio/minio:latest
    container_name: colophony-minio
    expose:
      - "9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - colophony

  # Create default MinIO buckets on startup
  minio-setup:
    image: minio/mc:latest
    container_name: colophony-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set minio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb minio/submissions --ignore-existing;
      mc mb minio/quarantine --ignore-existing;
      mc anonymous set none minio/submissions;
      mc anonymous set none minio/quarantine;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - colophony

  # tusd for resumable file uploads
  tusd:
    image: tusproject/tusd:latest
    container_name: colophony-tusd
    expose:
      - "1080"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
    command:
      - -port
      - "1080"
      - -s3-endpoint
      - http://minio:9000
      - -s3-bucket
      - quarantine
      - -s3-object-prefix
      - uploads/
      - -hooks-http
      - http://api:4000/webhooks/tusd
      - -hooks-http-forward-headers
      - Authorization,X-Organization-Id,X-Embed-Token,X-Status-Token
      - -cors-allow-origin
      - ".*"
      - -cors-allow-headers
      - Authorization,Origin,X-Requested-With,Content-Type,Upload-Length,Upload-Offset,Tus-Resumable,Upload-Metadata,Upload-Defer-Length,X-Organization-Id,X-Embed-Token,X-Status-Token
      - -behind-proxy
      - -base-path
      - /upload
    depends_on:
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - colophony

  # ClamAV virus scanning (optional — enable with --profile full)
  clamav:
    image: clamav/clamav:stable
    container_name: colophony-clamav
    expose:
      - "3310"
    volumes:
      - clamav_data:/var/lib/clamav
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
    profiles:
      - full
    networks:
      - colophony

  # Database migration (runs once, then exits)
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    container_name: colophony-migrate
    entrypoint: ["sh", "-c"]
    command:
      - |
        apk add --no-cache postgresql16-client bash
        /app/scripts/init-prod.sh
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-colophony}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-colophony}
      DATABASE_APP_URL: postgresql://app_user:${APP_USER_PASSWORD}@postgres:5432/${POSTGRES_DB:-colophony}
    volumes:
      - ./scripts/init-prod.sh:/app/scripts/init-prod.sh:ro
      - ./scripts/verify-rls.sh:/app/scripts/verify-rls.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - colophony

  # Prometheus metrics collection
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: colophony-prometheus
    expose:
      - "9090"
    volumes:
      - ./docker/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - colophony

  # AlertManager for Slack notifications
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: colophony-alertmanager
    expose:
      - "9093"
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - colophony

  # Grafana dashboards
  grafana:
    image: grafana/grafana:12.0.1
    container_name: colophony-grafana
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - colophony

  # Loki log aggregation
  loki:
    image: grafana/loki:3.5.0
    container_name: colophony-loki
    expose:
      - "3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki/loki-config.prod.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - colophony

  # Promtail log shipper
  promtail:
    image: grafana/promtail:3.5.0
    container_name: colophony-promtail
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - colophony

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  colophony:
    driver: bridge
