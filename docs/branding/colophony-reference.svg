<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&amp;display=swap');</style>
    <path id="star"
      d="M 0,-18 C 1,-13 3,-6 4.5,-4.5 C 6,-3 13,-1 18,0 C 13,1 6,3 4.5,4.5 C 3,6 1,13 0,18 C -1,13 -3,6 -4.5,4.5 C -6,3 -13,1 -18,0 C -13,-1 -6,-3 -4.5,-4.5 C -3,-6 -1,-13 0,-18 Z"/>
  </defs>

  <!-- Canonical reference: navy background baked in -->
  <rect width="1000" height="400" fill="#191c2b"/>

  <text x="500" y="215"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="100" font-weight="700" text-anchor="middle"
    fill="#f0e8d5" letter-spacing="-0.5">Colophony</text>

  <!-- Star position confirmed via browser at translate(510, 186) -->
  <use href="#star" transform="translate(510, 186)" fill="#c87941"/>

  <text x="500" y="263"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="21" font-weight="400" text-anchor="middle"
    fill="#d8cfc2" letter-spacing="0.05">
    <tspan>Submissions, </tspan><tspan font-style="italic" fill="#c87941">managed.</tspan>
  </text>
</svg>
