name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  # ──────────────────────────────────────────────────
  # Detect whether this is a docs-only change
  # ──────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs_only: ${{ steps.check.outputs.docs_only }}
    steps:
      - name: Check for code changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only --repo ${{ github.repository }})
          else
            FILES=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.files[].filename')
          fi
          # Count files that are NOT .md and NOT in docs/
          CODE_FILES=$(echo "$FILES" | grep -vcE '\.md$|^docs/' || true)
          echo "Changed files:"
          echo "$FILES"
          echo "Non-docs file count: $CODE_FILES"
          if [ "$CODE_FILES" -gt 0 ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────
  # Fast checks (~1 min): lint, format, type-check
  # ──────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # ──────────────────────────────────────────────────
  # Unit tests (~2 min): no infra required
  # ──────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run unit tests
        run: pnpm test

  # ──────────────────────────────────────────────────
  # API E2E tests (~5 min): needs Postgres + Redis
  # ──────────────────────────────────────────────────
  e2e-tests:
    name: API E2E Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: prospector_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build workspace packages
        run: pnpm turbo run build --filter=@prospector/db --filter=@prospector/types

      - name: Push schema to test database
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/prospector_test

      - name: Apply RLS policies
        run: |
          PGPASSWORD=test psql -h localhost -p 5433 -U test -d prospector_test \
            -f packages/db/prisma/rls-policies.sql
        continue-on-error: true

      - name: Create app_user role for RLS tests
        run: |
          PGPASSWORD=test psql -h localhost -p 5433 -U test -d prospector_test -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN
                CREATE ROLE app_user WITH LOGIN PASSWORD 'app_password' NOSUPERUSER NOBYPASSRLS;
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE prospector_test TO app_user;
            GRANT USAGE ON SCHEMA public TO app_user;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_user;
          "
        continue-on-error: true

      - name: Run API E2E tests
        run: pnpm --filter @prospector/api test:e2e
        env:
          DATABASE_TEST_URL: postgresql://test:test@localhost:5433/prospector_test
          DATABASE_APP_URL: postgresql://app_user:app_password@localhost:5433/prospector_test
          REDIS_URL: redis://localhost:6379
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # ──────────────────────────────────────────────────
  # Build verification (~2 min)
  # ──────────────────────────────────────────────────
  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build all packages
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
