  # ──────────────────────────────────────────────────
  # RLS integration tests (~3 min): needs Postgres
  # ──────────────────────────────────────────────────
  rls-tests:
    name: RLS Integration Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: colophony_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk
      - name: Run RLS integration tests
        run: pnpm --filter @colophony/api test:rls
        env:
          DATABASE_TEST_URL: postgresql://test:test@localhost:5433/colophony_test
          DATABASE_APP_URL: postgresql://app_user:app_password@localhost:5433/colophony_test

  # ──────────────────────────────────────────────────
  # Playwright E2E tests (~5 min): submissions project
  # ──────────────────────────────────────────────────
  playwright-tests:
    name: Playwright Submissions E2E
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.run_submissions == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colophony
          POSTGRES_PASSWORD: password
          POSTGRES_DB: colophony
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U colophony"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk
      - name: Create app_user role
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U colophony -d colophony -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN
                CREATE ROLE app_user WITH LOGIN PASSWORD 'app_password' NOSUPERUSER NOBYPASSRLS;
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE colophony TO app_user;
            GRANT USAGE ON SCHEMA public TO app_user;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO app_user;
          "
      - name: Run Drizzle migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Seed test data
        run: |
          echo 'DATABASE_URL="postgresql://colophony:password@localhost:5432/colophony"' > packages/db/.env
          pnpm db:seed
      - name: Install Playwright browsers
        run: pnpm --filter @colophony/web exec playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        run: pnpm --filter @colophony/web test:e2e
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────────
  # Playwright E2E tests (~5 min): embed project
  # Requires PostgreSQL + Redis
  # ──────────────────────────────────────────────────
  playwright-embed:
    name: Playwright Embed E2E
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.run_embed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colophony
          POSTGRES_PASSWORD: password
          POSTGRES_DB: colophony
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U colophony"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk
      - name: Create app_user role
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U colophony -d colophony -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN
                CREATE ROLE app_user WITH LOGIN PASSWORD 'app_password' NOSUPERUSER NOBYPASSRLS;
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE colophony TO app_user;
            GRANT USAGE ON SCHEMA public TO app_user;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO app_user;
          "
      - name: Run Drizzle migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Seed test data
        run: |
          echo 'DATABASE_URL="postgresql://colophony:password@localhost:5432/colophony"' > packages/db/.env
          pnpm db:seed
      - name: Install Playwright browsers
        run: pnpm --filter @colophony/web exec playwright install --with-deps chromium
      - name: Run Playwright embed E2E tests
        run: pnpm --filter @colophony/web test:e2e:embed
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-embed-report
          path: apps/web/playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────────
  # Playwright E2E tests (~5 min): slate project
  # Requires PostgreSQL + Redis
  # ──────────────────────────────────────────────────
  playwright-slate:
    name: Playwright Slate E2E
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.run_slate == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colophony
          POSTGRES_PASSWORD: password
          POSTGRES_DB: colophony
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U colophony"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk
      - name: Create app_user role
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U colophony -d colophony -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN
                CREATE ROLE app_user WITH LOGIN PASSWORD 'app_password' NOSUPERUSER NOBYPASSRLS;
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE colophony TO app_user;
            GRANT USAGE ON SCHEMA public TO app_user;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO app_user;
          "
      - name: Run Drizzle migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Seed test data
        run: |
          echo 'DATABASE_URL="postgresql://colophony:password@localhost:5432/colophony"' > packages/db/.env
          pnpm db:seed
      - name: Install Playwright browsers
        run: pnpm --filter @colophony/web exec playwright install --with-deps chromium
      - name: Run Playwright Slate E2E tests
        run: pnpm --filter @colophony/web test:e2e:slate
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-slate-report
          path: apps/web/playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────────
  # Playwright E2E tests (~8 min): uploads project
  # Requires PostgreSQL + MinIO + tusd
  # ──────────────────────────────────────────────────
  playwright-uploads:
    name: Playwright Uploads E2E
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.run_uploads == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colophony
          POSTGRES_PASSWORD: password
          POSTGRES_DB: colophony
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U colophony"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk
      - name: Create app_user role
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U colophony -d colophony -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN
                CREATE ROLE app_user WITH LOGIN PASSWORD 'app_password' NOSUPERUSER NOBYPASSRLS;
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE colophony TO app_user;
            GRANT USAGE ON SCHEMA public TO app_user;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO app_user;
          "
      - name: Run Drizzle migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Seed test data
        run: |
          echo 'DATABASE_URL="postgresql://colophony:password@localhost:5432/colophony"' > packages/db/.env
          pnpm db:seed
      - name: Start MinIO
        run: |
          docker run -d --name minio --network host \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data --console-address ":9001"
          timeout 30 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 2; done'
      - name: Create MinIO buckets
        run: |
          docker run --rm --network host --entrypoint /bin/sh minio/mc:latest -c "
            mc alias set minio http://localhost:9000 minioadmin minioadmin;
            mc mb minio/submissions --ignore-existing;
            mc mb minio/quarantine --ignore-existing;
            mc anonymous set none minio/submissions;
            mc anonymous set none minio/quarantine;
          "
      - name: Start tusd
        run: |
          docker run -d --name tusd --network host \
            -e AWS_ACCESS_KEY_ID=minioadmin \
            -e AWS_SECRET_ACCESS_KEY=minioadmin \
            -e AWS_REGION=us-east-1 \
            tusproject/tusd:latest \
            -port 1080 \
            -s3-endpoint http://localhost:9000 \
            -s3-bucket quarantine \
            -s3-object-prefix uploads/ \
            -hooks-http http://localhost:4010/webhooks/tusd \
            -hooks-http-forward-headers Authorization,X-Organization-Id,X-Api-Key \
            -behind-proxy -verbose
          timeout 15 bash -c 'until curl -sf http://localhost:1080; do sleep 2; done'
      - name: Install Playwright browsers
        run: pnpm --filter @colophony/web exec playwright install --with-deps chromium
      - name: Run Playwright uploads E2E tests
        run: pnpm --filter @colophony/web test:e2e:uploads
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== MinIO logs ===" && docker logs minio 2>&1 | tail -50 || true
          echo "=== tusd logs ===" && docker logs tusd 2>&1 | tail -100 || true
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-uploads-report
          path: apps/web/playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────────
  # Playwright E2E tests (~10 min): OIDC project
  # Requires PostgreSQL + Zitadel
  # ──────────────────────────────────────────────────
  playwright-oidc:
    name: Playwright OIDC E2E
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.run_oidc == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colophony
          POSTGRES_PASSWORD: password
          POSTGRES_DB: colophony
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U colophony"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk
      - name: Create app_user role
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U colophony -d colophony -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN
                CREATE ROLE app_user WITH LOGIN PASSWORD 'app_password' NOSUPERUSER NOBYPASSRLS;
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE colophony TO app_user;
            GRANT USAGE ON SCHEMA public TO app_user;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO app_user;
          "
      - name: Run Drizzle migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Seed test data
        run: |
          echo 'DATABASE_URL="postgresql://colophony:password@localhost:5432/colophony"' > packages/db/.env
          pnpm db:seed
      - name: Start Zitadel
        run: |
          mkdir -p .docker/zitadel/machinekey
          chmod 777 .docker/zitadel/machinekey
          docker run -d --name zitadel --network host \
            -v ${{ github.workspace }}/.docker/zitadel/machinekey:/machinekey \
            -e ZITADEL_DATABASE_POSTGRES_HOST=localhost \
            -e ZITADEL_DATABASE_POSTGRES_PORT=5432 \
            -e ZITADEL_DATABASE_POSTGRES_DATABASE=zitadel \
            -e ZITADEL_DATABASE_POSTGRES_USER_USERNAME=zitadel \
            -e ZITADEL_DATABASE_POSTGRES_USER_PASSWORD=zitadel_password \
            -e ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE=disable \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME=colophony \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD=password \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE=disable \
            -e ZITADEL_EXTERNALDOMAIN=localhost \
            -e ZITADEL_EXTERNALSECURE=false \
            -e ZITADEL_EXTERNALPORT=8080 \
            -e ZITADEL_TLS_ENABLED=false \
            -e ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED=false \
            -e ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_FORCEMFA=false \
            -e ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_FORCEMFALOCALONLY=false \
            -e "ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_SECONDFACTORS=" \
            -e "ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_MULTIFACTORS=" \
            -e ZITADEL_FIRSTINSTANCE_PATPATH=/machinekey/admin.pat \
            -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME=e2e-admin \
            -e "ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME=E2E Admin Service Account" \
            -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE=2030-01-01T00:00:00Z \
            ghcr.io/zitadel/zitadel:v4.10.1 \
            start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
      - name: Wait for Zitadel
        run: |
          echo "Waiting for Zitadel to be ready..."
          timeout 180 bash -c 'until curl -sf http://localhost:8080/debug/healthz; do sleep 5; done'
          echo "Zitadel is ready."
      - name: Provision Zitadel E2E config
        run: pnpm --filter @colophony/db exec tsx ../../scripts/setup-zitadel-e2e.ts
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
          ZITADEL_URL: http://localhost:8080
          ZITADEL_PAT_PATH: ${{ github.workspace }}/.docker/zitadel/machinekey/admin.pat
      - name: Install Playwright browsers
        run: pnpm --filter @colophony/web exec playwright install --with-deps chromium
      - name: Run Playwright OIDC E2E tests
        run: pnpm --filter @colophony/web test:e2e:oidc
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Show Zitadel logs on failure
        if: failure()
        run: docker logs zitadel 2>&1 | tail -100 || true
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-oidc-report
          path: apps/web/playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────────
  # Build verification (~2 min)
  # ──────────────────────────────────────────────────
  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk --filter=@colophony/api --filter=@colophony/types --filter=@colophony/web
