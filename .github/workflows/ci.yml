name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  # ──────────────────────────────────────────────────
  # Detect whether this is a docs-only change
  # ──────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs_only: ${{ steps.check.outputs.docs_only }}
      run_submissions: ${{ steps.suites.outputs.run_submissions }}
      run_embed: ${{ steps.suites.outputs.run_embed }}
      run_slate: ${{ steps.suites.outputs.run_slate }}
      run_uploads: ${{ steps.suites.outputs.run_uploads }}
      run_oidc: ${{ steps.suites.outputs.run_oidc }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/scripts
      - name: Check for code changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only --repo ${{ github.repository }})
          else
            FILES=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.files[].filename')
          fi
          # Count files that are NOT .md and NOT in docs/
          CODE_FILES=$(echo "$FILES" | grep -vcE '\.md$|^docs/' || true)
          echo "Changed files:"
          echo "$FILES"
          echo "Non-docs file count: $CODE_FILES"
          if [ "$CODE_FILES" -gt 0 ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi
          # Save file list for suite detection
          echo "$FILES" > /tmp/changed-files.txt
      - name: Detect Playwright suites to run
        id: suites
        run: |
          cat /tmp/changed-files.txt | bash .github/scripts/detect-changes.sh

  # ──────────────────────────────────────────────────
  # Fast checks (~1 min): lint, format, type-check
  # ──────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm turbo run type-check --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk --filter=@colophony/api --filter=@colophony/web

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # ──────────────────────────────────────────────────
  # Unit tests (~2 min): no infra required
  # ──────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk
      - name: Run unit tests
        run: pnpm --filter @colophony/db test && pnpm --filter @colophony/auth-client test && pnpm --filter @colophony/api test && pnpm --filter @colophony/web test

  # ──────────────────────────────────────────────────
  # API E2E tests (~5 min): needs Postgres + Redis
