          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""

  # ──────────────────────────────────────────────────
  # Python SDK tests: no infra required
  # ──────────────────────────────────────────────────
  python-sdk-tests:
    name: Python SDK Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: cd sdks/python && poetry install
      - name: Run Python SDK tests
        run: cd sdks/python && poetry run pytest -v

  # ──────────────────────────────────────────────────
  # Playwright E2E tests (~5 min): submissions project
  # ──────────────────────────────────────────────────
  playwright-tests:
    name: Playwright Submissions E2E
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.run_submissions == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colophony
          POSTGRES_PASSWORD: password
          POSTGRES_DB: colophony
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U colophony"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
