name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  # ──────────────────────────────────────────────────
  # Detect whether this is a docs-only change
  # ──────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs_only: ${{ steps.check.outputs.docs_only }}
      run_submissions: ${{ steps.suites.outputs.run_submissions }}
      run_embed: ${{ steps.suites.outputs.run_embed }}
      run_slate: ${{ steps.suites.outputs.run_slate }}
      run_workspace: ${{ steps.suites.outputs.run_workspace }}
      run_uploads: ${{ steps.suites.outputs.run_uploads }}
      run_oidc: ${{ steps.suites.outputs.run_oidc }}
      run_forms: ${{ steps.suites.outputs.run_forms }}
      run_organization: ${{ steps.suites.outputs.run_organization }}
      run_analytics: ${{ steps.suites.outputs.run_analytics }}
      run_federation: ${{ steps.suites.outputs.run_federation }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/scripts
      - name: Check for code changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Use List PR Files API (paginated) — gh pr diff fails on PRs with 300+ files
            FILES=$(gh api --paginate repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '.[].filename')
          else
            FILES=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.files[].filename')
          fi
          # Count files that are NOT .md and NOT in docs/
          CODE_FILES=$(echo "$FILES" | grep -vcE '\.md$|^docs/' || true)
          echo "Changed files:"
          echo "$FILES"
          echo "Non-docs file count: $CODE_FILES"
          if [ "$CODE_FILES" -gt 0 ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi
          # Save file list for suite detection
          echo "$FILES" > /tmp/changed-files.txt
      - name: Detect Playwright suites to run
        id: suites
        run: |
          cat /tmp/changed-files.txt | bash .github/scripts/detect-changes.sh

  # ──────────────────────────────────────────────────
  # Fast checks (~1 min): lint, format, type-check
  # ──────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm turbo run type-check --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk --filter=@colophony/api --filter=@colophony/web

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Block new quarantined tests
        if: github.event_name == 'pull_request'
        run: |
          FLAKY=$(git diff --name-only --diff-filter=A origin/main...HEAD | grep '\.flaky\.test\.' || true)
          if [ -n "$FLAKY" ]; then
            echo "::error::New quarantined test files detected — fix flaky tests instead of quarantining:"
            echo "$FLAKY"
            exit 1
          fi

  # ──────────────────────────────────────────────────
  # Unit tests (~2 min): no infra required
  # ──────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk
      - name: Run unit tests (shuffled, no retries)
        run: pnpm --filter @colophony/auth-client test && pnpm --filter @colophony/api test && pnpm --filter @colophony/web test

  # ──────────────────────────────────────────────────
  # Coverage report: runs test:cov across all packages
  # ──────────────────────────────────────────────────
  coverage:
    name: Coverage Report
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: colophony_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk
      - name: Run coverage (API unit tests)
        run: pnpm --filter @colophony/api test:cov
      - name: Run coverage (API RLS tests)
        run: pnpm --filter @colophony/api exec vitest run --config vitest.config.rls.ts --coverage --coverage.reportsDirectory=./coverage-rls
        env:
          DATABASE_TEST_URL: postgresql://test:test@localhost:5433/colophony_test
          DATABASE_APP_URL: postgresql://app_user:app_password@localhost:5433/colophony_test
      - name: Run coverage (API webhook tests)
        run: pnpm --filter @colophony/api exec vitest run --config vitest.config.webhooks.ts --coverage --coverage.reportsDirectory=./coverage-webhooks
        env:
          DATABASE_TEST_URL: postgresql://test:test@localhost:5433/colophony_test
          DATABASE_APP_URL: postgresql://app_user:app_password@localhost:5433/colophony_test
      - name: Run coverage (API security tests)
        run: pnpm --filter @colophony/api exec vitest run --config vitest.config.security.ts --coverage --coverage.reportsDirectory=./coverage-security
        env:
          DATABASE_TEST_URL: postgresql://test:test@localhost:5433/colophony_test
          DATABASE_APP_URL: postgresql://app_user:app_password@localhost:5433/colophony_test
      - name: Run coverage (API service tests)
        run: pnpm --filter @colophony/api exec vitest run --config vitest.config.services.ts --coverage --coverage.reportsDirectory=./coverage-services
        env:
          DATABASE_TEST_URL: postgresql://test:test@localhost:5433/colophony_test
          DATABASE_APP_URL: postgresql://app_user:app_password@localhost:5433/colophony_test
      - name: Run coverage (API queue tests)
        run: pnpm --filter @colophony/api exec vitest run --config vitest.config.queues.ts --coverage --coverage.reportsDirectory=./coverage-queues
        env:
          DATABASE_TEST_URL: postgresql://test:test@localhost:5433/colophony_test
          DATABASE_APP_URL: postgresql://app_user:app_password@localhost:5433/colophony_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
      - name: Run coverage (Web)
        run: pnpm --filter @colophony/web test:cov
      - name: Run coverage (packages)
        run: pnpm --filter @colophony/types test:cov && pnpm --filter @colophony/auth-client test:cov && pnpm --filter @colophony/api-client test:cov && pnpm --filter @colophony/plugin-sdk test:cov
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            apps/api/coverage/
            apps/api/coverage-rls/
            apps/api/coverage-webhooks/
            apps/api/coverage-security/
            apps/api/coverage-services/
            apps/api/coverage-queues/
            apps/web/coverage/
            packages/types/coverage/
            packages/api-client/coverage/
            packages/auth-client/coverage/
            packages/plugin-sdk/coverage/
          retention-days: 14
      - name: Merge coverage reports
        if: github.event_name == 'pull_request'
        run: |
          LCOV_FILES=(
            apps/api/coverage/lcov.info
            apps/api/coverage-rls/lcov.info
            apps/api/coverage-webhooks/lcov.info
            apps/api/coverage-security/lcov.info
            apps/api/coverage-services/lcov.info
            apps/api/coverage-queues/lcov.info
            apps/web/coverage/lcov.info
            packages/types/coverage/lcov.info
            packages/api-client/coverage/lcov.info
            packages/auth-client/coverage/lcov.info
            packages/plugin-sdk/coverage/lcov.info
          )
          for f in "${LCOV_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing coverage report: $f"
              exit 1
            fi
          done
          cat "${LCOV_FILES[@]}" > coverage-merged.lcov
      - name: Install diff-cover
        if: github.event_name == 'pull_request'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install diff-cover package
        if: github.event_name == 'pull_request'
        run: pip install diff-cover==9.2.4
      - name: Diff-cover (changed lines must be ≥80% covered)
        if: github.event_name == 'pull_request'
        run: |
          diff-cover coverage-merged.lcov \
            --compare-branch origin/${{ github.base_ref }} \
            --fail-under 80 \
            --diff-range-notation '..' \
            --exclude '**/node_modules/**' \
            --exclude '**/*.spec.ts' \
            --exclude '**/*.test.ts' \
            --exclude '**/*.spec.tsx' \
            --exclude '**/*.test.tsx'

