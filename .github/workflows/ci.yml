      - name: Seed test data
        run: |
          echo 'DATABASE_URL="postgresql://colophony:password@localhost:5432/colophony"' > packages/db/.env
          pnpm db:seed
      - name: Install Playwright browsers
        run: pnpm --filter @colophony/web exec playwright install --with-deps chromium
      - name: Run Playwright Federation E2E tests
        run: pnpm --filter @colophony/web test:e2e:federation
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-federation-report
          path: apps/web/playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────────
  # Playwright E2E tests (~8 min): uploads project
  # Requires PostgreSQL + Garage + tusd
  # ──────────────────────────────────────────────────
  playwright-uploads:
    name: Playwright Uploads E2E
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.run_uploads == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colophony
          POSTGRES_PASSWORD: password
          POSTGRES_DB: colophony
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U colophony"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk
      - name: Create app_user role
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U colophony -d colophony -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN
                CREATE ROLE app_user WITH LOGIN PASSWORD 'app_password' NOSUPERUSER NOBYPASSRLS;
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE colophony TO app_user;
            GRANT USAGE ON SCHEMA public TO app_user;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO app_user;
          "
      - name: Run Drizzle migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Seed test data
        run: |
          echo 'DATABASE_URL="postgresql://colophony:password@localhost:5432/colophony"' > packages/db/.env
          pnpm db:seed
      - name: Start Garage
        run: |
          mkdir -p /tmp/garage
          cat > /tmp/garage/garage.toml << 'TOML'
          metadata_dir = "/var/lib/garage/meta"
          data_dir = "/var/lib/garage/data"
          db_engine = "sqlite"
          replication_factor = 1
          rpc_bind_addr = "[::]:3901"
          rpc_public_addr = "127.0.0.1:3901"
          [s3_api]
          api_bind_addr = "[::]:3900"
          s3_region = "us-east-1"
          [admin]
          api_bind_addr = "[::]:3903"
          TOML
          # Strip leading whitespace from TOML (YAML heredoc indentation)
          sed -i 's/^[[:space:]]*//' /tmp/garage/garage.toml
          for attempt in 1 2 3; do
            docker run -d --name garage --network host \
              -e GARAGE_RPC_SECRET=$(openssl rand -hex 32) \
              -e GARAGE_ADMIN_TOKEN=ci-admin-token \
              -v /tmp/garage/garage.toml:/etc/garage.toml \
              dxflrs/garage:v2.2.0 && break
            echo "Garage start attempt $attempt failed, retrying in 5s..."
            docker rm -f garage 2>/dev/null || true
            sleep 5
          done
          # Wait for admin API (not /health — that requires a layout, applied in next step)
          timeout 30 bash -c 'until curl -sf -H "Authorization: Bearer ci-admin-token" http://localhost:3903/v2/GetClusterStatus > /dev/null 2>&1; do sleep 2; done'
      - name: Setup Garage buckets
        run: |
          # Layout (must use CLI — admin API's UpdateClusterLayout is unreliable in v2.2.0)
          NODE_ID=$(docker exec garage /garage status 2>/dev/null | grep -oP '^\s*\K[0-9a-f]{16}' | head -1)
          docker exec garage /garage layout assign -z dc1 -c 1G "$NODE_ID"
          docker exec garage /garage layout apply --version 1
          # Wait for /health (needs layout applied)
          timeout 15 bash -c 'until curl -sf http://localhost:3903/health > /dev/null 2>&1; do sleep 1; done'
          # Key + buckets via admin API
          TOKEN="ci-admin-token"
          auth() { curl -sf -H "Authorization: Bearer $TOKEN" "$@"; }
          auth -X POST -H 'Content-Type: application/json' \
            -d '{"name":"ci","accessKeyId":"GKdeadbeef12345678abcdef00","secretAccessKey":"0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"}' \
            "http://localhost:3903/v2/ImportKey"
          for BUCKET in submissions quarantine; do
            BUCKET_ID=$(auth -X POST -H 'Content-Type: application/json' \
              -d "{\"globalAlias\":\"$BUCKET\"}" "http://localhost:3903/v2/CreateBucket" | jq -r '.id')
            auth -X POST -H 'Content-Type: application/json' \
              -d "{\"bucketId\":\"$BUCKET_ID\",\"accessKeyId\":\"GKdeadbeef12345678abcdef00\",\"permissions\":{\"read\":true,\"write\":true,\"owner\":true}}" \
              "http://localhost:3903/v2/AllowBucketKey"
          done
      - name: Start tusd
        run: |
          for attempt in 1 2 3; do
            docker run -d --name tusd --network host \
              -e AWS_ACCESS_KEY_ID=GKdeadbeef12345678abcdef00 \
              -e AWS_SECRET_ACCESS_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef \
              -e AWS_REGION=us-east-1 \
              tusproject/tusd:v2.8.0 \
              -port 1080 \
              -s3-endpoint http://localhost:3900 \
              -s3-bucket quarantine \
              -s3-object-prefix uploads/ \
              -hooks-http http://localhost:4010/webhooks/tusd \
              -hooks-http-forward-headers Authorization,X-Organization-Id,X-Api-Key \
              -behind-proxy -verbose && break
            echo "tusd start attempt $attempt failed, retrying in 5s..."
            docker rm -f tusd 2>/dev/null || true
            sleep 5
          done
          timeout 15 bash -c 'until curl -sf http://localhost:1080; do sleep 2; done'
      - name: Install Playwright browsers
        run: pnpm --filter @colophony/web exec playwright install --with-deps chromium
      - name: Run Playwright uploads E2E tests
        run: pnpm --filter @colophony/web test:e2e:uploads
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== Garage logs ===" && docker logs garage 2>&1 | tail -50 || true
          echo "=== tusd logs ===" && docker logs tusd 2>&1 | tail -100 || true
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-uploads-report
          path: apps/web/playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────────
  # Playwright E2E tests (~10 min): OIDC project
  # Requires PostgreSQL + Zitadel
  # ──────────────────────────────────────────────────
  playwright-oidc:
    name: Playwright OIDC E2E
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.run_oidc == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colophony
          POSTGRES_PASSWORD: password
          POSTGRES_DB: colophony
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U colophony"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/types --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk
      - name: Create app_user role
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U colophony -d colophony -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN
                CREATE ROLE app_user WITH LOGIN PASSWORD 'app_password' NOSUPERUSER NOBYPASSRLS;
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE colophony TO app_user;
            GRANT USAGE ON SCHEMA public TO app_user;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO app_user;
          "
      - name: Run Drizzle migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Seed test data
        run: |
          echo 'DATABASE_URL="postgresql://colophony:password@localhost:5432/colophony"' > packages/db/.env
          pnpm db:seed
      - name: Start Zitadel
        run: |
          mkdir -p .docker/zitadel/machinekey
          chmod 777 .docker/zitadel/machinekey
          docker run -d --name zitadel --network host \
            -v ${{ github.workspace }}/.docker/zitadel/machinekey:/machinekey \
            -e ZITADEL_DATABASE_POSTGRES_HOST=localhost \
            -e ZITADEL_DATABASE_POSTGRES_PORT=5432 \
            -e ZITADEL_DATABASE_POSTGRES_DATABASE=zitadel \
            -e ZITADEL_DATABASE_POSTGRES_USER_USERNAME=zitadel \
            -e ZITADEL_DATABASE_POSTGRES_USER_PASSWORD=zitadel_password \
            -e ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE=disable \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME=colophony \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD=password \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE=disable \
            -e ZITADEL_EXTERNALDOMAIN=localhost \
            -e ZITADEL_EXTERNALSECURE=false \
            -e ZITADEL_EXTERNALPORT=8080 \
            -e ZITADEL_TLS_ENABLED=false \
            -e ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED=false \
            -e ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_FORCEMFA=false \
            -e ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_FORCEMFALOCALONLY=false \
            -e "ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_SECONDFACTORS=" \
            -e "ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_MULTIFACTORS=" \
            -e ZITADEL_FIRSTINSTANCE_PATPATH=/machinekey/admin.pat \
            -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME=e2e-admin \
            -e "ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME=E2E Admin Service Account" \
            -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE=2030-01-01T00:00:00Z \
            ghcr.io/zitadel/zitadel:v4.10.1 \
            start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
      - name: Wait for Zitadel
        run: |
          echo "Waiting for Zitadel to be ready..."
          timeout 180 bash -c 'until curl -sf http://localhost:8080/debug/healthz; do sleep 5; done'
          echo "Zitadel is ready."
      - name: Provision Zitadel E2E config
        run: pnpm --filter @colophony/db exec tsx ../../scripts/setup-zitadel-e2e.ts
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
          ZITADEL_URL: http://localhost:8080
          ZITADEL_PAT_PATH: ${{ github.workspace }}/.docker/zitadel/machinekey/admin.pat
      - name: Install Playwright browsers
        run: pnpm --filter @colophony/web exec playwright install --with-deps chromium
      - name: Run Playwright OIDC E2E tests
        run: pnpm --filter @colophony/web test:e2e:oidc
        env:
          DATABASE_URL: postgresql://colophony:password@localhost:5432/colophony
      - name: Show Zitadel logs on failure
        if: failure()
        run: docker logs zitadel 2>&1 | tail -100 || true
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-oidc-report
          path: apps/web/playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────────
  # Build verification (~2 min)
  # ──────────────────────────────────────────────────
  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm turbo run build --filter=@colophony/db --filter=@colophony/auth-client --filter=@colophony/api-contracts --filter=@colophony/plugin-sdk --filter=@colophony/api --filter=@colophony/types --filter=@colophony/web

  # ──────────────────────────────────────────────────
  # SDK drift check — ensure committed SDKs match spec
  # ──────────────────────────────────────────────────
  sdk-check:
    name: SDK Drift Check
    runs-on: ubuntu-latest
    if: needs.changes.outputs.docs_only != 'true'
    needs: [changes]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Install TS SDK deps
        run: cd sdks/typescript && npm ci
      - name: Regenerate TypeScript SDK
        run: |
          cd sdks/typescript
          npx openapi-typescript ../openapi.json -o src/generated/openapi.ts
          npx prettier --write src/generated/openapi.ts
          npx tsc -p tsconfig.build.json
      - name: Check for drift
        run: |
          if ! git diff --quiet sdks/typescript/src/generated/; then
            echo "::error::TypeScript SDK is out of date. Run 'pnpm sdk:generate' and commit."
            git diff --stat sdks/typescript/src/generated/
            exit 1
          fi
          echo "TypeScript SDK is up to date."
