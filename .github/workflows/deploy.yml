name: Deploy

on:
  # Auto-deploy to staging on merge to main
  push:
    branches: [main]
  # Manual deploy to production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - staging
          - production
      tag:
        description: 'Git tag or commit SHA to deploy (default: latest main)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  # ──────────────────────────────────────────────────
  # Determine deployment target
  # ──────────────────────────────────────────────────
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      ref: ${{ steps.env.outputs.ref }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.inputs.tag || github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────
  # Build and verify before deploying
  # ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Type check
        run: pnpm type-check

      - name: Build all packages
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: placeholder

  # ──────────────────────────────────────────────────
  # Deploy to staging (auto on push to main)
  # ──────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'staging'
    environment:
      name: staging
      url: http://${{ vars.STAGING_DOMAIN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ${{ vars.STAGING_APP_DIR }}
            git fetch origin main
            git checkout ${{ needs.prepare.outputs.ref }}
            docker compose -f docker-compose.staging.yml --env-file .env.staging build
            docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
            echo "Waiting for health checks..."
            sleep 15
            docker compose -f docker-compose.staging.yml ps

      - name: Verify deployment
        run: |
          for i in $(seq 1 5); do
            if curl -sf "http://${{ vars.STAGING_DOMAIN }}/health" > /dev/null 2>&1; then
              echo "Staging is healthy"
              exit 0
            fi
            echo "Attempt $i/5 — waiting..."
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

  # ──────────────────────────────────────────────────
  # Deploy to production (manual dispatch only)
  # ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'production'
    environment:
      name: production
      url: http://${{ vars.PRODUCTION_DOMAIN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd ${{ vars.PRODUCTION_APP_DIR }}
            git fetch origin main
            git checkout ${{ needs.prepare.outputs.ref }}
            docker compose -f docker-compose.prod.yml --env-file .env.prod build
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            echo "Waiting for health checks..."
            sleep 15
            docker compose -f docker-compose.prod.yml ps

      - name: Verify deployment
        run: |
          for i in $(seq 1 5); do
            if curl -sf "http://${{ vars.PRODUCTION_DOMAIN }}/health" > /dev/null 2>&1; then
              echo "Production is healthy"
              exit 0
            fi
            echo "Attempt $i/5 — waiting..."
            sleep 10
          done
          echo "Production health check failed"
          exit 1
