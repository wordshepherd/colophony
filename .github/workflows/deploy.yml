name: Deploy

on:
  # Auto-deploy to staging after CI passes on main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Manual deploy to staging or production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - staging
          - production
      tag:
        description: 'Git tag or commit SHA to deploy (default: latest main)'
        required: false
        type: string
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  # ──────────────────────────────────────────────────
  # Determine deployment target
  # ──────────────────────────────────────────────────
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      ref: ${{ steps.env.outputs.ref }}
      skip: ${{ steps.env.outputs.skip }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.inputs.tag || github.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "CI did not succeed (conclusion: ${{ github.event.workflow_run.conclusion }}), skipping deploy"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────
  # Build and verify before deploying
  # ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Build all packages
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: placeholder

  # ──────────────────────────────────────────────────
  # Deploy to staging via SSH + Docker Compose
  # ──────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'staging'
    permissions:
      contents: read
    environment:
      name: staging
      url: https://${{ vars.STAGING_DOMAIN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd ${{ vars.STAGING_APP_DIR }}

            echo "=== Pre-deploy diagnostics ==="
            echo "Current commit: $(git rev-parse HEAD)"
            echo "Working tree status:"
            git status --short
            echo "Target ref: ${{ needs.prepare.outputs.ref }}"

            echo "=== Updating source ==="
            git fetch origin main
            git reset --hard ${{ needs.prepare.outputs.ref }}
            git clean -fd
            echo "Checked out: $(git rev-parse HEAD)"
            echo "Landing components:"
            ls -la apps/web/src/components/landing/ 2>/dev/null || echo "MISSING"

            echo "=== Building images ==="
            docker compose -f docker-compose.prod.yml --env-file .env.staging --profile demo build --no-cache

            echo "=== Stopping old containers ==="
            docker compose -f docker-compose.prod.yml --env-file .env.staging --profile demo down --remove-orphans --timeout 30 || true
            docker ps -q --filter "name=colophony-" | xargs -r docker stop || true
            docker ps -aq --filter "name=colophony-" | xargs -r docker rm -f || true

            # Remove leftover Coolify proxy (migrated to Caddy in PR #336)
            echo "=== Clearing port 80/443 ==="
            docker stop coolify-proxy 2>/dev/null && docker rm coolify-proxy 2>/dev/null && echo "Removed coolify-proxy" || true
            # Safety net: kill any remaining process on port 80/443
            fuser -k 80/tcp 2>/dev/null || true
            fuser -k 443/tcp 2>/dev/null || true
            sleep 2

            echo "=== Starting containers ==="
            docker compose -f docker-compose.prod.yml --env-file .env.staging up -d
            echo "Starting demo services (if provisioned)..."
            docker compose -f docker-compose.prod.yml --env-file .env.staging --profile demo up -d --no-recreate 2>&1 || echo "::warning::Demo services failed to start — may need provisioning"
            echo "Waiting for services..."
            sleep 15
            docker compose -f docker-compose.prod.yml --env-file .env.staging --profile demo ps

      - name: Verify deployment
        run: |
          for i in $(seq 1 10); do
            if curl -sf "https://${{ vars.STAGING_DOMAIN }}/ready" > /dev/null 2>&1; then
              echo "Staging is healthy"
              exit 0
            fi
            echo "Attempt $i/10 — waiting..."
            sleep 15
          done
          echo "Staging health check failed"
          exit 1

      - name: Verify demo site
        run: |
          for i in $(seq 1 5); do
            if curl -sf "https://demo.${{ vars.STAGING_DOMAIN }}" > /dev/null 2>&1; then
              echo "Demo site is healthy"
              exit 0
            fi
            echo "Demo attempt $i/5 — waiting..."
            sleep 10
          done
          echo "::warning::Demo site health check failed — demo services may need manual setup"

      - name: Run smoke tests
        run: >-
          bash scripts/smoke-test.sh
          "https://${{ vars.STAGING_DOMAIN }}"
          --oidc-issuer "${{ vars.ZITADEL_AUTHORITY }}"
          --demo-url "https://demo.${{ vars.STAGING_DOMAIN }}"

  # ──────────────────────────────────────────────────
  # Deploy to production (manual dispatch only)
  # ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'production'
    permissions:
      contents: read
    environment:
      name: production
      url: https://${{ vars.PRODUCTION_DOMAIN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            cd ${{ vars.PRODUCTION_APP_DIR }}

            echo "=== Pre-deploy diagnostics ==="
            echo "Current commit: $(git rev-parse HEAD)"
            echo "Working tree status:"
            git status --short
            echo "Target ref: ${{ needs.prepare.outputs.ref }}"

            echo "=== Updating source ==="
            git fetch origin main
            git reset --hard ${{ needs.prepare.outputs.ref }}
            git clean -fd
            echo "Checked out: $(git rev-parse HEAD)"

            echo "=== Building images ==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod build --no-cache

            echo "=== Stopping old containers ==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod down --remove-orphans --timeout 30 || true
            docker ps -q --filter "name=colophony-" | xargs -r docker stop || true
            docker ps -aq --filter "name=colophony-" | xargs -r docker rm -f || true

            echo "=== Checking port 80/443 ==="
            echo "Port 80:" && (ss -tlnp sport = :80 || true)
            echo "Port 443:" && (ss -tlnp sport = :443 || true)
            echo "Docker containers on port 80:" && (docker ps --filter "publish=80" --format '{{.Names}} {{.Status}}' || true)
            fuser -k 80/tcp 2>/dev/null || true
            fuser -k 443/tcp 2>/dev/null || true
            sleep 2

            echo "=== Starting containers ==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            echo "Waiting for health checks..."
            sleep 15
            docker compose -f docker-compose.prod.yml ps

      - name: Verify deployment
        run: |
          for i in $(seq 1 5); do
            if curl -sf "https://${{ vars.PRODUCTION_DOMAIN }}/health" > /dev/null 2>&1; then
              echo "Production is healthy"
              exit 0
            fi
            echo "Attempt $i/5 — waiting..."
            sleep 10
          done
          echo "Production health check failed"
          exit 1

      - name: Run smoke tests
        run: >-
          bash scripts/smoke-test.sh
          "https://${{ vars.PRODUCTION_DOMAIN }}"
          --oidc-issuer "${{ vars.ZITADEL_AUTHORITY }}"
