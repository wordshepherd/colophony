name: Deploy

on:
  # Auto-deploy to staging after CI passes on main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Manual deploy to staging or production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - staging
          - production
      tag:
        description: 'Git tag or commit SHA to deploy (default: latest main)'
        required: false
        type: string
      groups:
        description: 'Comma-separated groups to deploy (data,app,gateway,uploads,monitoring,all)'
        required: false
        default: 'all'
        type: string

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  # ──────────────────────────────────────────────────
  # Determine deployment target
  # ──────────────────────────────────────────────────
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      ref: ${{ steps.env.outputs.ref }}
      skip: ${{ steps.env.outputs.skip }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.inputs.tag || github.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "CI did not succeed (conclusion: ${{ github.event.workflow_run.conclusion }}), skipping deploy"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────
  # Build and verify before deploying
  # ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Build all packages
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: placeholder

  # ──────────────────────────────────────────────────
  # Deploy to staging via Coolify webhooks (5 resource groups)
  # ──────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'staging'
    permissions:
      contents: read
      actions: write
    environment:
      name: staging
      url: https://${{ vars.STAGING_DOMAIN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Detect deploy groups
        id: groups
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          deploy_data=false
          deploy_app=false
          deploy_gateway=false
          deploy_uploads=false
          deploy_monitoring=false

          # Manual dispatch: use explicit groups input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            GROUPS="${{ github.event.inputs.groups }}"
            if echo "$GROUPS" | grep -qw "all"; then
              deploy_data=true; deploy_app=true; deploy_gateway=true
              deploy_uploads=true; deploy_monitoring=true
            else
              echo "$GROUPS" | grep -qw "data" && deploy_data=true || true
              echo "$GROUPS" | grep -qw "app" && deploy_app=true || true
              echo "$GROUPS" | grep -qw "gateway" && deploy_gateway=true || true
              echo "$GROUPS" | grep -qw "uploads" && deploy_uploads=true || true
              echo "$GROUPS" | grep -qw "monitoring" && deploy_monitoring=true || true
            fi
          else
            # Auto-deploy: detect changed files since last deploy
            LAST_SHA="${{ vars.LAST_DEPLOYED_SHA }}"
            CURRENT_SHA="${{ needs.prepare.outputs.ref }}"

            if [ -z "$LAST_SHA" ] || ! git rev-parse --verify "$LAST_SHA" >/dev/null 2>&1; then
              echo "No valid LAST_DEPLOYED_SHA — deploying all groups (safe fallback)"
              deploy_data=true; deploy_app=true; deploy_gateway=true
              deploy_uploads=true; deploy_monitoring=true
            else
              echo "Diffing $LAST_SHA..$CURRENT_SHA"
              CHANGED=$(git diff --name-only "$LAST_SHA" "$CURRENT_SHA" 2>/dev/null || echo "")

              if [ -z "$CHANGED" ]; then
                echo "No changes detected — deploying app group (default)"
                deploy_app=true
              else
                for file in $CHANGED; do
                  case "$file" in
                    docker/postgres/*|docker/pgbouncer/*|coolify/data.yml)
                      deploy_data=true ;;
                    apps/api/*|apps/web/*|packages/*|coolify/app.yml)
                      deploy_app=true ;;
                    scripts/init-prod.sh|pnpm-lock.yaml|pnpm-workspace.yaml|package.json|turbo.json)
                      deploy_app=true ;;
                    nginx/*|coolify/gateway.yml)
                      deploy_gateway=true ;;
                    coolify/uploads.yml)
                      deploy_uploads=true ;;
                    docker/prometheus/*|docker/alertmanager/*|docker/grafana/*|docker/loki/*|docker/promtail/*|coolify/monitoring.yml)
                      deploy_monitoring=true ;;
                  esac
                done

                # If nothing matched (e.g., docs-only changes), deploy app as default
                if [ "$deploy_data" = "false" ] && [ "$deploy_app" = "false" ] && \
                   [ "$deploy_gateway" = "false" ] && [ "$deploy_uploads" = "false" ] && \
                   [ "$deploy_monitoring" = "false" ]; then
                  echo "No infra-relevant changes detected — deploying app group (default)"
                  deploy_app=true
                fi
              fi
            fi
          fi

          echo "Deploy groups: data=$deploy_data app=$deploy_app gateway=$deploy_gateway uploads=$deploy_uploads monitoring=$deploy_monitoring"
          echo "deploy_data=$deploy_data" >> "$GITHUB_OUTPUT"
          echo "deploy_app=$deploy_app" >> "$GITHUB_OUTPUT"
          echo "deploy_gateway=$deploy_gateway" >> "$GITHUB_OUTPUT"
          echo "deploy_uploads=$deploy_uploads" >> "$GITHUB_OUTPUT"
          echo "deploy_monitoring=$deploy_monitoring" >> "$GITHUB_OUTPUT"

      - name: Deploy groups
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          WEBHOOK_DATA: ${{ secrets.COOLIFY_WEBHOOK_DATA }}
          WEBHOOK_APP: ${{ secrets.COOLIFY_WEBHOOK_APP }}
          WEBHOOK_GATEWAY: ${{ secrets.COOLIFY_WEBHOOK_GATEWAY }}
          WEBHOOK_UPLOADS: ${{ secrets.COOLIFY_WEBHOOK_UPLOADS }}
          WEBHOOK_MONITORING: ${{ secrets.COOLIFY_WEBHOOK_MONITORING }}
        run: |
          deploy_group() {
            local name="$1" url="$2"
            if [ -z "$url" ]; then
              echo "⚠ Skipping $name (no webhook URL configured)"
              return 0
            fi
            echo "Deploying $name..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              -X GET -H "Authorization: Bearer ${COOLIFY_TOKEN}" "$url")
            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
              echo "Failed to deploy $name (HTTP $HTTP_CODE)"
              exit 1
            fi
            echo "✓ $name deployment triggered"
          }

          # Deploy in dependency order with waits between dependent groups
          if [ "${{ steps.groups.outputs.deploy_data }}" = "true" ]; then
            deploy_group "data" "$WEBHOOK_DATA"
            echo "Waiting 30s for data services to start..."
            sleep 30
          fi
          if [ "${{ steps.groups.outputs.deploy_app }}" = "true" ]; then
            deploy_group "app" "$WEBHOOK_APP"
          fi
          if [ "${{ steps.groups.outputs.deploy_uploads }}" = "true" ]; then
            deploy_group "uploads" "$WEBHOOK_UPLOADS"
          fi
          if [ "${{ steps.groups.outputs.deploy_gateway }}" = "true" ]; then
            deploy_group "gateway" "$WEBHOOK_GATEWAY"
          fi
          if [ "${{ steps.groups.outputs.deploy_monitoring }}" = "true" ]; then
            deploy_group "monitoring" "$WEBHOOK_MONITORING"
          fi

      - name: Wait for deployment
        run: sleep 30

      - name: Verify deployment
        run: |
          for i in $(seq 1 10); do
            if curl -sf "https://${{ vars.STAGING_DOMAIN }}/ready" > /dev/null 2>&1; then
              echo "Staging is healthy (DB connectivity verified)"
              exit 0
            fi
            echo "Attempt $i/10 — waiting..."
            sleep 15
          done
          echo "Staging health check failed"
          exit 1

      - name: Run smoke tests
        run: >-
          bash scripts/smoke-test.sh
          "https://${{ vars.STAGING_DOMAIN }}"
          --oidc-issuer "${{ vars.ZITADEL_AUTHORITY }}"

      - name: Update last deployed SHA
        if: >-
          success() &&
          steps.groups.outputs.deploy_data == 'true' &&
          steps.groups.outputs.deploy_app == 'true' &&
          steps.groups.outputs.deploy_gateway == 'true' &&
          steps.groups.outputs.deploy_uploads == 'true' &&
          steps.groups.outputs.deploy_monitoring == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "All groups deployed — updating LAST_DEPLOYED_SHA"
          gh variable set LAST_DEPLOYED_SHA \
            --body "${{ needs.prepare.outputs.ref }}" \
            --repo "${{ github.repository }}" \
            --env staging

  # ──────────────────────────────────────────────────
  # Deploy to production (manual dispatch only)
  # ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'production'
    permissions:
      contents: read
    environment:
      name: production
      url: https://${{ vars.PRODUCTION_DOMAIN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd ${{ vars.PRODUCTION_APP_DIR }}
            git fetch origin main
            git checkout ${{ needs.prepare.outputs.ref }}
            docker compose -f docker-compose.prod.yml --env-file .env.prod build
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            echo "Waiting for health checks..."
            sleep 15
            docker compose -f docker-compose.prod.yml ps

      - name: Verify deployment
        run: |
          for i in $(seq 1 5); do
            if curl -sf "https://${{ vars.PRODUCTION_DOMAIN }}/health" > /dev/null 2>&1; then
              echo "Production is healthy"
              exit 0
            fi
            echo "Attempt $i/5 — waiting..."
            sleep 10
          done
          echo "Production health check failed"
          exit 1

      - name: Run smoke tests
        run: >-
          bash scripts/smoke-test.sh
          "https://${{ vars.PRODUCTION_DOMAIN }}"
          --oidc-issuer "${{ vars.ZITADEL_AUTHORITY }}"
