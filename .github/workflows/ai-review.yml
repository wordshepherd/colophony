name: AI Code Review

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: ai-review-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  review:
    name: AI Review
    runs-on: ubuntu-latest
    # Only run when CI succeeded and it was triggered by a PR
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR associated with this workflow run
          PR_NUMBER=$(gh pr list --head "${{ github.event.workflow_run.head_branch }}" --json number -q '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for branch ${{ github.event.workflow_run.head_branch }}"
            exit 1
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Get PR context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get PR metadata
          PR_TITLE=$(gh pr view ${{ steps.pr.outputs.number }} --json title -q .title)
          PR_BODY=$(gh pr view ${{ steps.pr.outputs.number }} --json body -q .body)

          # Get the diff (truncate at ~200K chars to stay within context limits)
          DIFF=$(gh pr diff ${{ steps.pr.outputs.number }} | head -c 200000)

          # Get list of changed files
          FILES=$(gh pr view ${{ steps.pr.outputs.number }} --json files -q '.files[].path' | head -100)

          # Write to files (avoids shell escaping issues)
          echo "$PR_TITLE" > /tmp/pr_title.txt
          echo "$PR_BODY" > /tmp/pr_body.txt
          echo "$DIFF" > /tmp/pr_diff.txt
          echo "$FILES" > /tmp/pr_files.txt

      - name: Run AI review
        id: review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_REVIEW_MODEL: ${{ vars.AI_REVIEW_MODEL || 'moonshotai/kimi-k2.5' }}
        run: |
          # Write system prompt to file (avoids shell variable size limits)
          cat <<'SYSPROMPT' > /tmp/system_prompt.txt
          You are a senior code reviewer for a multi-tenant submissions platform (TypeScript monorepo: Fastify API + Next.js frontend + Drizzle ORM + PostgreSQL with Row-Level Security).

          Review the PR diff for:

          **Critical (flag clearly):**
          - Security vulnerabilities (SQL injection, XSS, CSRF, command injection)
          - Multi-tenancy / RLS violations: any Drizzle query on tenant tables (submissions, payments, audit_events, submission_files, etc.) that runs outside a transaction with `SET LOCAL app.current_org`
          - Secrets or credentials in code
          - PCI violations (logging/storing card data)
          - Missing webhook idempotency checks (Stripe events must check `processed` flag)
          - GDPR violations (data retention, missing consent checks)

          **Important:**
          - Missing input validation (all API procedures need Zod schemas)
          - Missing error handling on external service calls (Stripe, S3, Redis)
          - Missing audit logging on sensitive operations (status changes, deletions, payments, GDPR actions)
          - Race conditions or transaction safety issues
          - N+1 queries or missing database indexes for new query patterns

          **Suggestions:**
          - Code clarity and maintainability
          - Type safety improvements
          - Test coverage gaps for new code paths

          **Do NOT comment on:**
          - Formatting or style (handled by Prettier/ESLint in CI)
          - Import ordering
          - Minor naming preferences

          Format your response as markdown. Start with a one-line summary verdict:
          - ✅ **LGTM** — no issues found
          - ⚠️ **Minor issues** — suggestions but not blocking
          - 🚨 **Issues found** — should be addressed before merge

          Then list findings grouped by severity. Reference specific file paths and line numbers from the diff where possible. Keep the review concise — focus on what matters.
          SYSPROMPT

          # Build user prompt from file contents (avoids ARG_MAX on large diffs)
          {
            echo "## PR: $(cat /tmp/pr_title.txt)"
            echo ""
            echo "### Description"
            cat /tmp/pr_body.txt
            echo ""
            echo "### Changed Files"
            cat /tmp/pr_files.txt
            echo ""
            echo "### Diff"
            echo '```diff'
            cat /tmp/pr_diff.txt
            echo '```'
          } > /tmp/user_prompt.txt

          # Build JSON payload from files using jq --rawfile (bypasses shell ARG_MAX)
          RESPONSE=$(jq -n \
            --arg model "$AI_REVIEW_MODEL" \
            --rawfile system /tmp/system_prompt.txt \
            --rawfile user /tmp/user_prompt.txt \
            '{
              model: $model,
              messages: [
                { role: "system", content: $system },
                { role: "user", content: $user }
              ],
              max_tokens: 4096,
              temperature: 0.2
            }' | curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
              -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
              -H "X-Title: Prospector AI Review" \
              -d @-)

          # Extract the review content
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          MODEL_USED=$(echo "$RESPONSE" | jq -r '.model // empty')
          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')

          if [ -n "$ERROR" ] && [ "$ERROR" != "null" ]; then
            echo "OpenRouter API error: $ERROR"
            echo "review_failed=true" >> "$GITHUB_OUTPUT"
            echo "$ERROR" > /tmp/review_error.txt
          elif [ -z "$REVIEW" ]; then
            echo "Empty response from OpenRouter"
            echo "review_failed=true" >> "$GITHUB_OUTPUT"
            echo "Empty response" > /tmp/review_error.txt
          else
            echo "review_failed=false" >> "$GITHUB_OUTPUT"
            echo "$REVIEW" > /tmp/review_body.txt
            echo "$MODEL_USED" > /tmp/model_used.txt
          fi

      - name: Post review comment
        if: steps.review.outputs.review_failed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODEL_USED=$(cat /tmp/model_used.txt)
          REVIEW_BODY=$(cat /tmp/review_body.txt)

          COMMENT=$(cat <<EOF
          ## 🤖 AI Code Review

          ${REVIEW_BODY}

          ---
          <sub>Model: \`${MODEL_USED}\` via OpenRouter | [Configure](https://github.com/${{ github.repository }}/settings/variables/actions)</sub>
          EOF
          )

          echo "$COMMENT" | gh pr comment ${{ steps.pr.outputs.number }} --body-file -

      - name: Post error comment
        if: steps.review.outputs.review_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ERROR=$(cat /tmp/review_error.txt)
          gh pr comment ${{ steps.pr.outputs.number }} \
            --body "## 🤖 AI Code Review

          ⚠️ Review could not be completed: \`${ERROR}\`

          <sub>Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.</sub>"
