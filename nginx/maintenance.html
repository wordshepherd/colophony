<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="30">
    <title>Colophony — Starting Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fafaf9;
            color: #292524;
        }
        .container {
            text-align: center;
            max-width: 480px;
            padding: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #57534e;
        }
        .subtle {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #a8a29e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Colophony</h1>
        <p>The service is starting up or undergoing maintenance. This page will refresh automatically.</p>
        <p class="subtle">If this persists beyond a few minutes, check the deployment logs.</p>
    </div>
</body>
</html>
