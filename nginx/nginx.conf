worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Dynamic DNS resolution via Docker's embedded DNS.
    # nginx OSS caches upstream IPs at startup and never re-resolves them.
    # Using resolver + variable-based proxy_pass forces re-resolution every 10s,
    # preventing gateway timeouts when containers are recreated during redeploys.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Proxy timeouts — fail fast rather than hang when backends are restarting
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Maintenance page for upstream failures (connection refused, timeout)
        error_page 502 503 504 /maintenance.html;
        location = /maintenance.html {
            root /usr/share/nginx/html;
            internal;
        }

        # nginx-local health check — does NOT proxy to backend.
        # Used by Docker healthcheck and Coolify/Traefik health detection.
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # tRPC API
        location /trpc {
            limit_req zone=api burst=20 nodelay;

            set $upstream_api http://api:4000;
            proxy_pass $upstream_api$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 10m;
        }

        # REST API endpoints (webhooks, health, etc.)
        location /api {
            limit_req zone=api burst=20 nodelay;

            set $upstream_api http://api:4000;
            proxy_pass $upstream_api$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 10m;
        }

        # Health check (no rate limit)
        location = /health {
            set $upstream_api http://api:4000;
            proxy_pass $upstream_api/health;
            proxy_set_header Host $host;
        }

        # Readiness check (no rate limit)
        location = /ready {
            set $upstream_api http://api:4000;
            proxy_pass $upstream_api/ready;
            proxy_set_header Host $host;
        }

        # Stripe webhooks (no rate limit — Stripe sends these)
        location /webhooks {
            set $upstream_api http://api:4000;
            proxy_pass $upstream_api$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 1m;
        }

        # tusd hooks (internal, from tusd sidecar)
        location /hooks {
            set $upstream_api http://api:4000;
            proxy_pass $upstream_api$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 1m;
        }

        # Resumable file uploads via tus protocol
        location /upload {
            # No body size limit — tus handles chunked uploads
            client_max_body_size 0;

            set $upstream_tusd http://tusd:1080;
            proxy_pass $upstream_tusd$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for tus protocol
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;

            # Disable buffering for streaming uploads
            proxy_request_buffering off;
            proxy_buffering off;
        }

        # Grafana dashboards (sub-path hosting, own auth)
        location /grafana/ {
            set $upstream_grafana http://grafana:3000;
            proxy_pass $upstream_grafana$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Grafana Live)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        # Next.js frontend (default)
        location / {
            set $upstream_web http://web:3000;
            proxy_pass $upstream_web$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 10m;
        }
    }
}
